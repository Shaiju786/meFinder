<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeFinder — Daily Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1F4E79, #2E75B6);
      color: white;
      padding: 24px 32px;
      text-align: center;
    }
    header h1 { font-size: 2rem; letter-spacing: 1px; }
    header p { font-size: 0.95rem; opacity: 0.85; margin-top: 4px; }

    .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .card h2 {
      font-size: 1rem;
      color: #1F4E79;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* MODE BUTTONS */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .mode-btn {
      padding: 14px;
      border: 2px solid #dde3ec;
      border-radius: 12px;
      background: white;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #444;
      font-weight: 500;
    }
    .mode-btn:hover { border-color: #2E75B6; color: #2E75B6; }
    .mode-btn.active { background: #2E75B6; color: white; border-color: #2E75B6; }

    /* TIME */
    select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #dde3ec;
      border-radius: 10px;
      font-size: 1rem;
      color: #333;
      background: white;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #2E75B6; }

    /* FOCUS PILLS */
    .pills { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill {
      padding: 10px 20px;
      border: 2px solid #dde3ec;
      border-radius: 30px;
      background: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #444;
    }
    .pill:hover { border-color: #2E75B6; color: #2E75B6; }
    .pill.active { background: #2E75B6; color: white; border-color: #2E75B6; }

    /* GENERATE BUTTON */
    .generate-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1F4E79, #2E75B6);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.5px;
    }
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 32px;
      color: #2E75B6;
      font-size: 1rem;
      display: none;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #dde3ec;
      border-top-color: #2E75B6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESULTS */
    #results { display: none; }

    /* CHECKLIST */
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f4f8;
    }
    .task-item:last-child { border-bottom: none; }
    .task-check {
      width: 22px; height: 22px;
      border: 2px solid #2E75B6;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .task-check.checked { background: #2E75B6; }
    .task-check.checked::after { content: "✓"; color: white; font-size: 13px; font-weight: bold; }
    .task-text { flex: 1; font-size: 0.95rem; }
    .task-text.done { text-decoration: line-through; color: #aaa; }
    .task-duration {
      font-size: 0.8rem;
      color: #888;
      background: #f0f4f8;
      padding: 3px 8px;
      border-radius: 20px;
    }

    /* JOURNAL PROMPTS */
    .prompt-card {
      background: #f7f9fc;
      border-left: 4px solid #2E75B6;
      padding: 12px 16px;
      border-radius: 0 10px 10px 0;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: #333;
    }

    /* WHAT I NOW */
    .now-box {
      background: linear-gradient(135deg, #e8f0f9, #d4e6f7);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 500;
      color: #1F4E79;
    }

    /* GRATITUDE */
    .gratitude-item {
      padding: 10px 0;
      border-bottom: 1px solid #f0f4f8;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .gratitude-item:last-child { border-bottom: none; }
    .gratitude-item::before { content: "🌟"; font-size: 1rem; }

    /* NEXT STEP */
    .next-box {
      background: linear-gradient(135deg, #1F4E79, #2E75B6);
      color: white;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 500;
    }

    /* ERROR */
    .error-box {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>🌅 MeFinder</h1>
  <p>Your personalised daily routine planner</p>
</header>

<div class="container">

  <!-- MODE SELECTOR -->
  <div class="card">
    <h2>Choose Your Mode</h2>
    <div class="mode-grid">
      <button class="mode-btn active" data-mode="self">🙋 Self</button>
      <button class="mode-btn" data-mode="parents">👨‍👩‍👧 Parents</button>
      <button class="mode-btn" data-mode="kids">🧒 Kids</button>
      <button class="mode-btn" data-mode="family & friends">👥 Family & Friends</button>
    </div>
  </div>

  <!-- TIME SELECTOR -->
  <div class="card">
    <h2>Available Time</h2>
    <select id="timeSelect">
      <option value="15">15 minutes</option>
      <option value="30" selected>30 minutes</option>
      <option value="45">45 minutes</option>
      <option value="60">60 minutes</option>
    </select>
  </div>

  <!-- FOCUS PILLS -->
  <div class="card">
    <h2>Focus Area</h2>
    <div class="pills">
      <button class="pill active" data-focus="Journaling">📓 Journaling</button>
      <button class="pill" data-focus="Planning">📋 Planning</button>
      <button class="pill" data-focus="Reflection">🪞 Reflection</button>
    </div>
  </div>

  <!-- GENERATE BUTTON -->
  <button class="generate-btn" id="generateBtn" onclick="generatePlan()">
    ✨ Generate My Plan
  </button>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Creating your personalised plan...</p>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="errorBox"></div>

  <!-- RESULTS -->
  <div id="results">

    <!-- TODAY'S PLAN -->
    <div class="card" style="margin-top:20px;">
      <h2>📋 Today's Plan</h2>
      <div id="todayPlan"></div>
    </div>

    <!-- WHAT I NOW -->
    <div class="card">
      <h2>⚡ Do This Right Now</h2>
      <div class="now-box" id="whatINow"></div>
    </div>

    <!-- JOURNALING PROMPTS -->
    <div class="card">
      <h2>📓 Journaling Prompts</h2>
      <div id="journalingPrompts"></div>
    </div>

    <!-- GRATITUDE -->
    <div class="card">
      <h2>🌟 Gratitude Moments</h2>
      <div id="gratitude"></div>
    </div>

    <!-- NEXT STEP -->
    <div class="card">
      <h2>🚀 Tomorrow's Next Step</h2>
      <div class="next-box" id="nextStep"></div>
    </div>

  </div>
</div>

<script>
  // SELECTIONS
  let selectedMode = 'self';
  let selectedFocus = 'Journaling';

  // MODE BUTTONS
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMode = btn.dataset.mode;
    });
  });

  // FOCUS PILLS
  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedFocus = pill.dataset.focus;
    });
  });

  // GENERATE PLAN
  async function generatePlan() {
    const time = document.getElementById('timeSelect').value;
    const btn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const errorBox = document.getElementById('errorBox');

    btn.disabled = true;
    loading.style.display = 'block';
    results.style.display = 'none';
    errorBox.style.display = 'none';

    try {
      const response = await fetch('https://shaiju-8.app.n8n.cloud/webhook/meFinder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          routine_mode: selectedMode,
          available_time: parseInt(time),
          focus_area: selectedFocus
        })
      });

      const raw = await response.text();
      let data;

      // Try to find JSON in the response
      try {
        data = JSON.parse(raw);
      } catch {
        const match = raw.match(/\{[\s\S]*\}/);
        if (match) data = JSON.parse(match[0]);
        else throw new Error('Could not parse response');
      }

      // Handle nested Routine key if present
      if (data.Routine) {
        try { data = JSON.parse(data.Routine); } catch {}
      }

      renderResults(data);
      results.style.display = 'block';

    } catch (err) {
      errorBox.style.display = 'block';
      errorBox.textContent = 'Something went wrong. Please try again. (' + err.message + ')';
    }

    btn.disabled = false;
    loading.style.display = 'none';
  }

  // RENDER RESULTS
  function renderResults(data) {
    // TODAY'S PLAN
    const planDiv = document.getElementById('todayPlan');
    planDiv.innerHTML = '';
    (data.TodayPlan || []).forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'task-item';
      div.innerHTML = `
        <div class="task-check" id="check-${i}" onclick="toggleTask(${i})"></div>
        <span class="task-text" id="task-${i}">${item.task}</span>
        <span class="task-duration">${item.duration}</span>
      `;
      planDiv.appendChild(div);
    });

    // WHAT I NOW
    document.getElementById('whatINow').textContent = data.WhatINow || '';

    // JOURNALING PROMPTS
    const journalDiv = document.getElementById('journalingPrompts');
    journalDiv.innerHTML = '';
    (data.JournalingPrompts || []).forEach(q => {
      const div = document.createElement('div');
      div.className = 'prompt-card';
      div.textContent = q;
      journalDiv.appendChild(div);
    });

    // GRATITUDE
    const gratDiv = document.getElementById('gratitude');
    gratDiv.innerHTML = '';
    (data.Gratitude || []).forEach(g => {
      const div = document.createElement('div');
      div.className = 'gratitude-item';
      div.textContent = g;
      gratDiv.appendChild(div);
    });

    // NEXT STEP
    document.getElementById('nextStep').textContent = data.NextStep || '';
  }

  // TICK TASK
  function toggleTask(i) {
    const check = document.getElementById('check-' + i);
    const text = document.getElementById('task-' + i);
    check.classList.toggle('checked');
    text.classList.toggle('done');
  }
</script>

</body>
</html>
