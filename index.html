<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeFinder — Daily Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1F4E79, #2E75B6); color: white; padding: 24px 32px; text-align: center; }
    header h1 { font-size: 2rem; }
    header p { font-size: 0.95rem; opacity: 0.85; margin-top: 4px; }
    .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .card h2 { font-size: 1rem; color: #1F4E79; margin-bottom: 16px; text-transform: uppercase; }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mode-btn { padding: 14px; border: 2px solid #dde3ec; border-radius: 12px; background: white; font-size: 0.95rem; cursor: pointer; color: #444; font-weight: 500; }
    .mode-btn.active { background: #2E75B6; color: white; border-color: #2E75B6; }
    select { width: 100%; padding: 12px 16px; border: 2px solid #dde3ec; border-radius: 10px; font-size: 1rem; color: #333; background: white; }
    .pills { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill { padding: 10px 20px; border: 2px solid #dde3ec; border-radius: 30px; background: white; font-size: 0.9rem; cursor: pointer; color: #444; }
    .pill.active { background: #2E75B6; color: white; border-color: #2E75B6; }
    .generate-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #1F4E79, #2E75B6); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .loading { text-align: center; padding: 32px; color: #2E75B6; display: none; }
    .spinner { width: 36px; height: 36px; border: 4px solid #dde3ec; border-top-color: #2E75B6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #results { display: none; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f4f8; }
    .task-item:last-child { border-bottom: none; }
    .task-check { width: 22px; height: 22px; border: 2px solid #2E75B6; border-radius: 6px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .task-check.checked { background: #2E75B6; }
    .task-check.checked::after { content: "✓"; color: white; font-size: 13px; font-weight: bold; }
    .task-text { flex: 1; font-size: 0.95rem; }
    .task-text.done { text-decoration: line-through; color: #aaa; }
    .task-duration { font-size: 0.8rem; color: #888; background: #f0f4f8; padding: 3px 8px; border-radius: 20px; }
    .prompt-card { background: #f7f9fc; border-left: 4px solid #2E75B6; padding: 12px 16px; border-radius: 0 10px 10px 0; margin-bottom: 10px; font-size: 0.95rem; }
    .now-box { background: linear-gradient(135deg, #e8f0f9, #d4e6f7); border-radius: 12px; padding: 20px; text-align: center; font-size: 1.1rem; font-weight: 500; color: #1F4E79; }
    .gratitude-item { padding: 10px 0; border-bottom: 1px solid #f0f4f8; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }
    .gratitude-item:last-child { border-bottom: none; }
    .gratitude-item::before { content: "🌟"; }
    .next-box { background: linear-gradient(135deg, #1F4E79, #2E75B6); color: white; border-radius: 12px; padding: 20px; text-align: center; font-size: 1.05rem; font-weight: 500; }
    .error-box { background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000; padding: 16px; border-radius: 10px; text-align: center; margin-top: 16px; display: none; }
    .debug-box { background: #f5f5f5; border: 1px solid #ddd; padding: 12px; border-radius: 8px; font-size: 11px; font-family: monospace; margin-top: 12px; display: none; max-height: 150px; overflow-y: auto; word-break: break-all; }
  </style>
</head>
<body>
<header>
  <h1>🌅 MeFinder</h1>
  <p>Your personalised daily routine planner</p>
</header>
<div class="container">
  <div class="card">
    <h2>Choose Your Mode</h2>
    <div class="mode-grid">
      <button class="mode-btn active" data-mode="self">🙋 Self</button>
      <button class="mode-btn" data-mode="parents">👨‍👩‍👧 Parents</button>
      <button class="mode-btn" data-mode="kids">🧒 Kids</button>
      <button class="mode-btn" data-mode="family & friends">👥 Family & Friends</button>
    </div>
  </div>
  <div class="card">
    <h2>Available Time</h2>
    <select id="timeSelect">
      <option value="15">15 minutes</option>
      <option value="30" selected>30 minutes</option>
      <option value="45">45 minutes</option>
      <option value="60">60 minutes</option>
    </select>
  </div>
  <div class="card">
    <h2>Focus Area</h2>
    <div class="pills">
      <button class="pill active" data-focus="Journaling">📓 Journaling</button>
      <button class="pill" data-focus="Planning">📋 Planning</button>
      <button class="pill" data-focus="Reflection">🪞 Reflection</button>
    </div>
  </div>
  <button class="generate-btn" id="generateBtn" onclick="generatePlan()">✨ Generate My Plan</button>
  <div class="loading" id="loading"><div class="spinner"></div><p>Creating your plan...</p></div>
  <div class="error-box" id="errorBox"></div>
  <div class="debug-box" id="debugBox"></div>
  <div id="results">
    <div class="card" style="margin-top:20px;"><h2>📋 Today's Plan</h2><div id="todayPlan"></div></div>
    <div class="card"><h2>⚡ Do This Right Now</h2><div class="now-box" id="whatINow"></div></div>
    <div class="card"><h2>📓 Journaling Prompts</h2><div id="journalingPrompts"></div></div>
    <div class="card"><h2>🌟 Gratitude Moments</h2><div id="gratitude"></div></div>
    <div class="card"><h2>🚀 Tomorrow's Next Step</h2><div class="next-box" id="nextStep"></div></div>
  </div>
</div>
<script>
  let selectedMode = 'self';
  let selectedFocus = 'Journaling';

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMode = btn.dataset.mode;
    });
  });

  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedFocus = pill.dataset.focus;
    });
  });

  function extractJSON(raw) {
    if (typeof raw === 'object' && raw !== null) {
      if (raw.Routine) {
        try { return JSON.parse(raw.Routine); } catch {}
        try { return JSON.parse(raw.Routine.replace(/\\n/g, ' ')); } catch {}
      }
      if (raw.result) { try { return JSON.parse(raw.result); } catch {} }
      if (raw.data && raw.data.outputs) {
        const o = raw.data.outputs;
        if (o.result) { try { return JSON.parse(o.result); } catch {} }
        if (o.Routine) { try { return JSON.parse(o.Routine); } catch {} }
      }
      if (raw.TodayPlan) return raw;
    }
    if (typeof raw === 'string') {
      try { return JSON.parse(raw); } catch {}
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) { try { return JSON.parse(match[0]); } catch {} }
    }
    return null;
  }

  async function generatePlan() {
    const time = document.getElementById('timeSelect').value;
    const btn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const errorBox = document.getElementById('errorBox');
    const debugBox = document.getElementById('debugBox');

    btn.disabled = true;
    loading.style.display = 'block';
    results.style.display = 'none';
    errorBox.style.display = 'none';
    debugBox.style.display = 'none';

    try {
      const response = await fetch('https://shaiju-8.app.n8n.cloud/webhook/meFinder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ routine_mode: selectedMode, available_time: parseInt(time), focus_area: selectedFocus })
      });

      const rawText = await response.text();
      debugBox.style.display = 'block';
      debugBox.textContent = 'RAW RESPONSE: ' + rawText.substring(0, 500);

      let parsed;
      try { parsed = JSON.parse(rawText); } catch { parsed = rawText; }

      const data = extractJSON(parsed);

      if (!data || !data.TodayPlan) {
        errorBox.style.display = 'block';
        errorBox.textContent = 'Could not read AI response. See debug info below.';
      } else {
        debugBox.style.display = 'none';
        renderResults(data);
        results.style.display = 'block';
      }
    } catch (err) {
      errorBox.style.display = 'block';
      errorBox.textContent = 'Connection error: ' + err.message;
    }

    btn.disabled = false;
    loading.style.display = 'none';
  }

  function renderResults(data) {
    const planDiv = document.getElementById('todayPlan');
    planDiv.innerHTML = '';
    (data.TodayPlan || []).forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'task-item';
      div.innerHTML = '<div class="task-check" id="check-' + i + '" onclick="toggleTask(' + i + ')"></div><span class="task-text" id="task-' + i + '">' + item.task + '</span><span class="task-duration">' + item.duration + '</span>';
      planDiv.appendChild(div);
    });
    document.getElementById('whatINow').textContent = data.WhatINow || '';
    const journalDiv = document.getElementById('journalingPrompts');
    journalDiv.innerHTML = '';
    (data.JournalingPrompts || []).forEach(q => {
      const div = document.createElement('div');
      div.className = 'prompt-card';
      div.textContent = q;
      journalDiv.appendChild(div);
    });
    const gratDiv = document.getElementById('gratitude');
    gratDiv.innerHTML = '';
    (data.Gratitude || []).forEach(g => {
      const div = document.createElement('div');
      div.className = 'gratitude-item';
      div.textContent = g;
      gratDiv.appendChild(div);
    });
    document.getElementById('nextStep').textContent = data.NextStep || '';
  }

  function toggleTask(i) {
    document.getElementById('check-' + i).classList.toggle('checked');
    document.getElementById('task-' + i).classList.toggle('done');
  }
</script>
</body>
</html>
